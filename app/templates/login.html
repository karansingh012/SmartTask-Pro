{% extends "base.html" %}

{% block content %}
<section class="container d-flex align-items-center justify-content-center py-5" style="min-height: 100vh;">
  <div class="card-shell p-4 p-md-5" style="max-width: 480px; width: 100%;">
    <div class="text-center mb-4">
      <h2 class="brand-title">Welcome back</h2>
      <p class="text-muted">Sign in to manage your tasks</p>
    </div>
    {% if error %}
    <div class="alert alert-danger mb-3" role="alert">
      {{ error }}
    </div>
    {% endif %}
    <form
      method="POST"
      action="{{ url_for('auth.login') }}"
    >
      <div class="mb-3">
        <label class="form-label">Email or username</label>
        <input
          class="form-control ghost-input"
          name="identifier"
          placeholder="you@company.com"
          required
        />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control ghost-input"
          name="password"
          placeholder="Enter password"
          required
        />
      </div>
      <button class="btn btn-primary w-100" type="submit">Login</button>
      <div class="loading-overlay">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    </form>
    <div class="text-center mt-3">
      <small class="text-muted">No account yet?</small>
      <a href="/auth/register" class="ms-1">Create one</a>
    </div>
  </div>
</section>
{% endblock %}
