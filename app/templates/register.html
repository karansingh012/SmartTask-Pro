{% extends "base.html" %}

{% block content %}
<section class="container d-flex align-items-center justify-content-center py-5" style="min-height: 100vh;">
  <div class="card-shell p-4 p-md-5" style="max-width: 520px; width: 100%;">
    <div class="text-center mb-4">
      <h2 class="brand-title">Create your account</h2>
      <p class="text-muted">Start organizing your tasks with SmartTask</p>
    </div>
    {% if error %}
    <div class="alert alert-danger mb-3" role="alert">
      {{ error }}
    </div>
    {% endif %}
    <form
      method="POST"
      action="{{ url_for('auth.register') }}"
    >
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Username</label>
          <input
            class="form-control ghost-input"
            name="username"
            placeholder="janedoe"
            required
          />
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input
            type="email"
            class="form-control ghost-input"
            name="email"
            placeholder="you@company.com"
            required
          />
        </div>
        <div class="col-12">
          <label class="form-label">Password</label>
          <input
            type="password"
            class="form-control ghost-input"
            name="password"
            placeholder="Minimum 8 characters"
            required
          />
        </div>
        <div class="col-12">
          <label class="form-label">Confirm password</label>
          <input
            type="password"
            class="form-control ghost-input"
            name="confirm_password"
            placeholder="Repeat password"
            required
          />
        </div>
      </div>
      <button class="btn btn-primary w-100 mt-4" type="submit">Create account</button>
    </form>
    <div class="text-center mt-3">
      <small class="text-muted">Already have an account?</small>
      <a href="/auth/login" class="ms-1">Sign in</a>
    </div>
  </div>
</section>
{% endblock %}
